name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pulse
          POSTGRES_PASSWORD: pulse
          POSTGRES_DB: pulse
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pulse"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        working-directory: server
        run: bun install --frozen-lockfile

      - name: Typecheck
        working-directory: server
        run: bun run typecheck

      - name: Apply migrations
        working-directory: server
        env:
          DATABASE_URL: postgres://pulse:pulse@localhost:5432/pulse
        run: bun run migrate

      - name: Run tests
        working-directory: server
        env:
          DATABASE_URL: postgres://pulse:pulse@localhost:5432/pulse
        run: bun test

  agent:
    name: build agent
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # libdbus-1-dev is needed by `dbus-secret-service`, a transitive dep of
      # `keyring`'s linux backend (added in ca54e6a). Without it cargo build
      # fails with "Package dbus-1 was not found in the pkg-config search path".
      - name: Install libdbus headers
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: agent -> target

      - name: cargo build
        working-directory: agent
        run: cargo build --locked

      - name: cargo test
        working-directory: agent
        run: cargo test --locked

      - name: shell-hook smoke test (zsh)
        run: |
          sudo apt-get update && sudo apt-get install -y zsh
          /bin/zsh -c '
            export PULSE_BUFFER=/tmp/hook.jsonl
            rm -f $PULSE_BUFFER
            source agent/scripts/pulse-hook.zsh
            _pulse_preexec "claude --foo bar"
            ( exit 0 ); _pulse_precmd
            _pulse_preexec "ls -la"
            ( exit 0 ); _pulse_precmd
          '
          test -f /tmp/hook.jsonl
          # Exactly one record (ls is not on the allowlist)
          test "$(wc -l < /tmp/hook.jsonl)" = "1"
          # The cmd must be exactly "claude" (no leak from args)
          grep -q '"cmd":"claude"' /tmp/hook.jsonl
          ! grep -q '"cmd":"claude --' /tmp/hook.jsonl

      - name: shell-hook smoke test (bash)
        run: |
          rm -f /tmp/hook-bash.jsonl
          /bin/bash -c '
            export PULSE_BUFFER=/tmp/hook-bash.jsonl
            source agent/scripts/pulse-hook.bash
            trap - DEBUG
            _pulse_recognize "codex --hello"; ( exit 0 ); _pulse_prompt
            _pulse_recognize "ls -la";        ( exit 0 ); _pulse_prompt
            _pulse_recognize "sudo aider x";  ( exit 0 ); _pulse_prompt
          '
          test "$(wc -l < /tmp/hook-bash.jsonl)" = "2"
          grep -q '"cmd":"codex"' /tmp/hook-bash.jsonl
          grep -q '"cmd":"aider"' /tmp/hook-bash.jsonl
